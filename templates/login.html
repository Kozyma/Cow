<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#EEEFEA">
  <title>로그인 · 영농형 태양광 관리</title>
  <link rel="manifest" href="{{ url_for('manifest') }}">
  <link rel="apple-touch-icon" href="{{ url_for('static', filename='icon-180.png') }}">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="태양광관리">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <main class="auth auth-lg">
    <div class="auth-wrap">

      <div class="brand">
        <div class="mark"><span class="mark-sun"></span></div>
        <div class="brand-name">영농형 태양광 관리</div>
        <p class="brand-tag">축산 · 태양광 · 재무를 <b>한 곳에서</b> 관리하는 우리 농장 스마트 장부</p>
      </div>

      <div class="feat-list">
        <div class="feat"><i class="fdot green"></i>
          <div><b>농축산</b><small>이표 등록 · 사육·판매·마릿수 관리</small></div></div>
        <div class="feat"><i class="fdot amber"></i>
          <div><b>태양광</b><small>발전량 기록 · 예상 수익 자동 계산</small></div></div>
        <div class="feat"><i class="fdot blue"></i>
          <div><b>재무</b><small>수입·지출·세금·지원사업 정리</small></div></div>
        <div class="feat"><i class="fdot gray"></i>
          <div><b>할일 루틴 · 통계</b><small>구역별 체크 · 마릿수·수익 추이</small></div></div>
      </div>

      <div class="auth-card">
        <p class="lead" style="margin:0 0 6px">아이디와 비밀번호로 로그인하세요.</p>
        {% if notice %}<div class="flash ok" style="margin-top:12px">{{ notice }}</div>{% endif %}
        {% if error %}<div class="flash error" style="margin-top:12px">{{ error }}</div>{% endif %}
        <form method="post">
          <input type="text" name="username" placeholder="아이디" autocomplete="username" autofocus required>
          <input type="password" name="password" placeholder="비밀번호" autocomplete="current-password" required>
          <button type="submit" class="btn" style="width:100%">로그인</button>
        </form>
        <p class="lead" style="margin-top:14px">
          계정이 없으신가요? <a href="{{ url_for('signup') }}">회원가입</a>
        </p>
      </div>

    </div>
  </main>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#ffffff">
  <title>회원가입 · 영농형 태양광 관리</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <main class="auth">
    <div class="auth-card">
      <div class="auth-mk"></div>
      <h1>회원가입</h1>
      <p class="lead">계정을 신청하면 관리자 승인 후 로그인할 수 있습니다.</p>
      {% if error %}<div class="flash error" style="margin-top:16px">{{ error }}</div>{% endif %}
      <form method="post">
        <input type="text" name="name" placeholder="이름" autocomplete="name"
               value="{{ form.name }}" autofocus required>
        <input type="text" name="username" placeholder="아이디 (영문·숫자, 3자 이상)"
               autocomplete="username" value="{{ form.username }}" required
               inputmode="latin" autocapitalize="none" spellcheck="false">
        <input type="text" name="phone" placeholder="연락처 (선택)"
               autocomplete="tel" inputmode="tel" value="{{ form.phone }}">
        <input type="password" name="password" placeholder="비밀번호 (4자 이상)"
               autocomplete="new-password" required>
        <input type="password" name="password2" placeholder="비밀번호 확인"
               autocomplete="new-password" required>
        <button type="submit" class="btn" style="width:100%">가입 신청</button>
      </form>
      <p class="lead" style="margin-top:16px">
        이미 계정이 있나요? <a href="{{ url_for('login') }}">로그인</a>
      </p>
    </div>
  </main>
</body>
</html>

services:
  web:
    build: .
    image: cow-web:latest
    container_name: cow-web
    restart: unless-stopped
    ports:
      - "80:8000"
    env_file:
      - .env
    environment:
      DATA_DIR: /app/data
      PORT: "8000"
    volumes:
      # SQLite 파일(farm_data.db)을 named volume에 보관 → 재배포/재빌드에도 데이터 유지
      - cow-data:/app/data

volumes:
  cow-data:
